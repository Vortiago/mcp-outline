# Docker Compose override for E2E tests.
# Usage: docker compose -p mcp-outline-e2e -f docker-compose.yml -f docker-compose.e2e.yml up -d outline
#
# Runs alongside the dev stack without conflicts:
#   - Separate project name → own containers and volumes
#   - Different host ports (3031/5557 vs 3030/5556)
#   - E2E-specific Outline env file (generated by conftest.py)
#   - Dex entrypoint rewrites config for E2E ports

services:
  dex:
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed 's/localhost:5556/localhost:5557/g; s/localhost:3030/localhost:3031/g' \
          /etc/dex/config.docker.yaml > /tmp/dex-e2e.yaml \
        && exec dex serve /tmp/dex-e2e.yaml
    ports:
      - "5557:5556"

  outline:
    env_file: ./tests/e2e/outline.env
    ports:
      - "3031:3030"

  mcp-outline:
    profiles: ["disabled"]

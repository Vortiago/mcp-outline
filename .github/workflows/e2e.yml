name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  checks: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare Outline config
        run: cp config/outline.env.example config/outline.env

      - name: Start Outline stack
        run: docker compose -p mcp-outline-e2e -f docker-compose.yml -f docker-compose.e2e.yml up -d outline
        env:
          DEX_HOST_PORT: "5557"
          OUTLINE_HOST_PORT: "3031"

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v -m e2e --junit-xml=e2e-results.xml

      - name: Test report
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6
        if: always()
        with:
          report_paths: e2e-results.xml
          check_name: E2E Test Report

      - name: Tear down
        if: always()
        run: docker compose -p mcp-outline-e2e -f docker-compose.yml -f docker-compose.e2e.yml down -v

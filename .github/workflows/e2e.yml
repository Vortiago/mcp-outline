name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  checks: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Prepare Outline config
        run: |
          cp config/outline.env.example config/outline.env
          SECRET1=$(openssl rand -hex 32)
          SECRET2=$(openssl rand -hex 32)
          sed -i "0,/REPLACE_WITH_openssl_rand_hex_32_OUTPUT/s/REPLACE_WITH_openssl_rand_hex_32_OUTPUT/$SECRET1/" config/outline.env
          sed -i "0,/REPLACE_WITH_openssl_rand_hex_32_OUTPUT/s/REPLACE_WITH_openssl_rand_hex_32_OUTPUT/$SECRET2/" config/outline.env

      - name: Start Outline stack
        run: docker compose up -d outline

      - name: Wait for Outline
        run: |
          echo "Waiting for Outline to become ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3030 > /dev/null 2>&1; then
              echo "Outline is ready after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "Timeout waiting for Outline"
          docker compose logs
          exit 1

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v -m e2e --junit-xml=e2e-results.xml

      - name: Test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: e2e-results.xml
          check_name: E2E Test Report

      - name: Tear down
        if: always()
        run: docker compose down -v

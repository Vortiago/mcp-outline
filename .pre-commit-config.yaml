# Pre-commit hooks for code quality
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      # Format code
      - id: ruff-format
        args: []
      # Lint code with auto-fixes
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # Type checking with pyright
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]

      # Run test suite (addopts in pyproject.toml excludes integration+e2e)
      - id: pytest
        name: pytest (fast unit tests)
        entry: uv run pytest tests/ -v
        language: system
        types: [python]
        pass_filenames: false

      - id: generate-test-docs
        name: Generate test docs
        entry: uv run poe generate-test-docs
        language: system
        files: ^tests/.*\.(py|mmd)$
        pass_filenames: false

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-toml
      - id: mixed-line-ending
